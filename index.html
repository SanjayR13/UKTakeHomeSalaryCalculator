// ═══════════════════════════════════════════════════════════════════════════════
// CALCULATION ENGINE
// ═══════════════════════════════════════════════════════════════════════════════
function parseTaxCode(code, defaultPA) {
  const c = (code || '').trim().toUpperCase().replace(/\s/g, '');
  if (!c || c === '1257L') return { pa: defaultPA, specialRate: null };
  if (c === 'BR')  return { pa: 0, specialRate: 0.20 };
  if (c === 'D0')  return { pa: 0, specialRate: 0.40 };
  if (c === 'D1')  return { pa: 0, specialRate: 0.45 };
  if (c === 'NT')  return { pa: 0, specialRate: 0 };
  if (c === '0T')  return { pa: 0, specialRate: null };
  const kMatch = c.match(/^K(\d+)/);
  if (kMatch) return { pa: -(parseInt(kMatch[1]) * 10), specialRate: null };
  const numMatch = c.match(/^(\d+)/);
  if (numMatch) return { pa: parseInt(numMatch[1]) * 10, specialRate: null };
  return { pa: defaultPA, specialRate: null };
}

function explainTaxCode(code, defaultPA) {
  const c = (code || '').trim().toUpperCase().replace(/\s/g, '');
  if (!c) return { text: 'Enter your tax code from your most recent payslip, P60, or HMRC letter. If unsure, 1257L is the standard code for most UK employees.', type: 'neutral' };
  if (c === '1257L') return { text: 'Standard tax code. You have a Personal Allowance of £12,570 — the amount you can earn each year before paying Income Tax. The "L" suffix means you\'re entitled to the standard Personal Allowance.', type: 'good' };
  if (c === 'BR') return { text: 'Basic Rate — all income from this source is taxed at 20% with no Personal Allowance applied. This is commonly used for a second job, a pension, or when HMRC needs more information about your circumstances.', type: 'warn' };
  if (c === 'D0') return { text: 'Higher Rate — all income taxed at 40% with no Personal Allowance. Typically used for a second job where you have already used your Personal Allowance elsewhere.', type: 'warn' };
  if (c === 'D1') return { text: 'Additional Rate — all income taxed at 45% with no Personal Allowance applied. Used for income subject to the additional rate tax.', type: 'warn' };
  if (c === 'NT') return { text: 'No Tax — no Income Tax is deducted from this income source. Used in specific circumstances agreed with HMRC (e.g. overseas workers, crown employees).', type: 'good' };
  if (c === '0T') return { text: 'Zero allowance — no Personal Allowance applied, so all income is taxed from £0. Often used when starting a new job without a P45, or when HMRC does not have enough information. You may be owed a refund once your correct code is applied.', type: 'warn' };
  const kMatch = c.match(/^K(\d+)/);
  if (kMatch) {
    const adj = parseInt(kMatch[1]) * 10;
    return { text: `K code — your deductions (e.g. company benefits or unpaid tax) of £${adj.toLocaleString()} exceed your allowances. This amount is added to your taxable income rather than deducted. Your employer collects additional tax each pay period to cover this. Contact HMRC on 0300 200 3300 if you believe this is incorrect.`, type: 'warn' };
  }
  const emergency = c.endsWith('W1') || c.endsWith('M1') || c.endsWith('X');
  const numMatch = c.match(/^(\d+)([A-Z]+)?/);
  if (numMatch) {
    const pa = parseInt(numMatch[1]) * 10;
    const rawSuffix = (numMatch[2] || '');
    const suffix = rawSuffix.replace('W1','').replace('M1','').replace('X','');
    let suffixNote = '';
    if (suffix === 'M') suffixNote = ' You have received 10% of your partner\'s Personal Allowance through Marriage Allowance (+£1,260).';
    if (suffix === 'N') suffixNote = ' You have transferred 10% of your Personal Allowance to your partner through Marriage Allowance (−£1,260).';
    if (suffix === 'T') suffixNote = ' Your tax code requires individual calculation — HMRC may need to review your circumstances, such as adjustments for benefits or allowances.';
    if (suffix === 'S') suffixNote = ' Scottish taxpayer — Scottish Income Tax rates and bands apply to your non-savings, non-dividend income.';
    if (suffix === 'C') suffixNote = ' Welsh taxpayer — Welsh rates apply (currently the same as England/NI rates).';
    let diff = '';
    if (pa < defaultPA) diff = ` This is reduced from the standard £${defaultPA.toLocaleString()}, likely because of taxable company benefits, unpaid tax from a previous year, or income over £100,000 (where the Personal Allowance is tapered away).`;
    if (pa > defaultPA) diff = ` This is higher than the standard £${defaultPA.toLocaleString()}, possibly due to allowable work expenses, job-related costs, or Marriage Allowance received from your partner.`;
    const emergNote = emergency ? ' ⚠ This is an emergency / non-cumulative code (Month 1 or Week 1 basis) — tax is recalculated each pay period from scratch, ignoring what has been deducted so far. This often means too much tax is temporarily deducted. Update your employer once your correct code is received.' : '';
    const typeVal = emergency ? 'warn' : pa === defaultPA ? 'good' : 'info';
    return { text: `Personal Allowance of £${pa.toLocaleString()} — you can earn up to this amount before paying Income Tax this year.${diff}${suffixNote}${emergNote}`, type: typeVal };
  }
  return { text: 'Unrecognised tax code. Double-check your payslip or P60, or contact HMRC on 0300 200 3300 to confirm.', type: 'warn' };
}

function calcIncomeTax(income, taxCodeStr, yearData, isScottish, rasAdjustment) {
  const { pa: defaultPA, bands, scottish } = yearData;
  const { pa: codedPA, specialRate } = parseTaxCode(taxCodeStr, defaultPA);
  let effectivePA = codedPA;
  // PA taper based on ANI: deduct gross RAS pension contributions before checking £100k threshold
  const incomeForTaper = income - (rasAdjustment || 0);
  if (specialRate === null && incomeForTaper > 100000) {
    const reduction = Math.min(Math.max(0, codedPA), Math.floor((incomeForTaper - 100000) / 2));
    effectivePA = codedPA - reduction;
  }
  const paShift = defaultPA - effectivePA;
  const chosenBands = isScottish ? scottish : bands;
  let incomeTax = 0;
  const bandBreakdown = [];

  if (specialRate !== null) {
    incomeTax = income * specialRate;
    if (income > 0) bandBreakdown.push({ name: `${(specialRate*100).toFixed(0)}% Flat Rate`, taxable: income, rate: specialRate, amount: incomeTax });
    return { incomeTax, bandBreakdown, effectivePA };
  }

  for (const band of chosenBands) {
    const adjFrom = Math.max(0, band.from - paShift);
    const adjTo = band.to === Infinity ? Infinity : Math.max(0, band.to - paShift);
    if (income <= adjFrom) continue;
    const taxable = Math.min(income, adjTo === Infinity ? income : adjTo) - adjFrom;
    if (taxable <= 0) continue;
    const tax = taxable * band.rate;
    incomeTax += tax;
    bandBreakdown.push({ name: band.name, taxable, rate: band.rate, amount: tax });
  }
  return { incomeTax, bandBreakdown, effectivePA };
}

function calcNI(earnings, niData) {
  if (earnings <= niData.lower) return 0;
  if (earnings <= niData.upper) return (earnings - niData.lower) * niData.rate1;
  return (niData.upper - niData.lower) * niData.rate1 + (earnings - niData.upper) * niData.rate2;
}

function calcStudentLoan(gross, plan, yearData) {
  if (plan === 'None' || !yearData.studentLoan[plan]) return 0;
  const { threshold, rate } = yearData.studentLoan[plan];
  return gross > threshold ? (gross - threshold) * rate : 0;
}

function getMarginalRate(income, effectivePA, bands, niData, specialRate) {
  if (specialRate !== null) return specialRate + (income > niData.lower ? niData.rate1 : 0);
  let taxRate = 0;
  for (const b of bands) {
    if (income > b.from && income <= (b.to === Infinity ? income + 1 : b.to)) { taxRate = b.rate; break; }
  }
  // PA taper zone: £1 PA lost per £2 earned means effective marginal rate = taxRate × 1.5
  if (income > 100000 && income < 125140) return taxRate * 1.5 + niData.rate2;
  let niRate = 0;
  if (income > niData.lower && income <= niData.upper) niRate = niData.rate1;
  else if (income > niData.upper) niRate = niData.rate2;
  return taxRate + niRate;
}

function calcAll(inputs, yearData) {
  const { salary, bonus, bonusEnabled, taxCode, region,
    pensionEmpPct, pensionEmpFixed, pensionEmpUseFixed, pensionEmpMethod,
    pensionErPct, pensionErFixed, pensionErUseFixed,
    pensionErPassNiSaving, pensionIncludeBonus,
    evEnabled, evMonthly, evP11d, evIsEV, evManualBikPct,
    otherSacEnabled, otherSacMonthly,
    benMedical, benDental, benOther, studentLoan,
    otherIncomeEnabled, otherIncomeRental, otherIncomeSavings, otherIncomeDividends, otherIncomeOther,
    allowancesEnabled, allowancesFreq, allowanceCar, allowanceOnCall, allowanceOther,
    netDeductions, netAdditions } = inputs;

  const isScottish = region === 'scotland';
  const sal = Math.max(0, Number(salary) || 0);
  const bon = bonusEnabled ? Math.max(0, Number(bonus) || 0) : 0;

  const pensionBase = pensionIncludeBonus ? sal + bon : sal;
  const pensionEmpAnnual = pensionEmpUseFixed
    ? Math.max(0, Number(pensionEmpFixed) || 0)
    : Math.max(0, pensionBase * ((Number(pensionEmpPct) || 0) / 100));

  const evSacAnnual    = evEnabled       ? Math.max(0, (Number(evMonthly)       || 0) * 12) : 0;
  const otherSacAnnual = otherSacEnabled ? Math.max(0, (Number(otherSacMonthly) || 0) * 12) : 0;
  const pensionSacAnnual = pensionEmpMethod === 'sacrifice' ? pensionEmpAnnual : 0;
  const totalSacrifice   = pensionSacAnnual + evSacAnnual + otherSacAnnual;
  const grossAfterSac    = Math.max(0, sal - totalSacrifice);

  const bikPct     = evEnabled ? (evIsEV ? (yearData.evBikPct || 0.03) : (Number(evManualBikPct) || 0) / 100) : 0;
  const evBikValue = evEnabled ? Math.max(0, (Number(evP11d) || 0) * bikPct) : 0;
  const p11dBenefits  = ((Number(benMedical)||0) + (Number(benDental)||0) + (Number(benOther)||0)) * 12;
  const totalBenefits = p11dBenefits + evBikValue;
  const allowMult = allowancesFreq === 'monthly' ? 12 : 1;
  const totalAllowances = allowancesEnabled
    ? Math.max(0, ((Number(allowanceCar)||0) + (Number(allowanceOnCall)||0) + (Number(allowanceOther)||0)) * allowMult)
    : 0;
  const otherIncomeAnnual = otherIncomeEnabled
    ? Math.max(0, (Number(otherIncomeRental)||0) + (Number(otherIncomeSavings)||0) + (Number(otherIncomeDividends)||0) + (Number(otherIncomeOther)||0))
    : 0;
  const niableIncome  = grossAfterSac + totalAllowances;
  const taxableIncome = niableIncome + totalBenefits + otherIncomeAnnual;

  const { incomeTax, bandBreakdown, effectivePA } = calcIncomeTax(taxableIncome, taxCode, yearData, isScottish, pensionReliefAmount);
  const { incomeTax: itBonus } = calcIncomeTax(taxableIncome + bon, taxCode, yearData, isScottish, pensionReliefAmount);
  const taxOnBonus = itBonus - incomeTax;

  const niAmount = calcNI(niableIncome, yearData.ni);
  const niBonus  = calcNI(niableIncome + bon, yearData.ni) - niAmount;
  const slAmount = calcStudentLoan(niableIncome, studentLoan, yearData);
  const slBonus  = calcStudentLoan(niableIncome + bon, studentLoan, yearData) - slAmount;

  const pensionReliefAmount = pensionEmpMethod === 'relief' ? pensionEmpAnnual : 0;
  const pensionReliefNet = pensionReliefAmount * 0.8;
  const pensionErAnnual = pensionErUseFixed
    ? Math.max(0, Number(pensionErFixed) || 0)
    : Math.max(0, sal * ((Number(pensionErPct) || 0) / 100));
  const pensionErNiSaving = pensionErPassNiSaving ? pensionSacAnnual * (yearData.erNiRate||0.138) : 0;
  const pensionErEffective = pensionErAnnual + pensionErNiSaving;

  // Pension Annual Allowance taper (HMRC rules)
  const annualAllowance = yearData.annualAllowance || 60000;
  const minTaperedAA    = yearData.minTaperedAllowance || 10000;
  // Threshold income: sacrifice already reduced taxableIncome; only deduct RAS contributions
  const pensionEmpRAS   = pensionEmpMethod === 'relief' ? pensionEmpAnnual : 0;
  const thresholdIncome = taxableIncome + bon - pensionEmpRAS;
  // Adjusted income: add back sacrifice (excluded from taxableIncome) + employer contributions
  const adjustedIncome  = thresholdIncome + pensionSacAnnual + pensionErEffective;
  let effectiveAA = annualAllowance;
  if (adjustedIncome > 260000 && thresholdIncome > 200000) {
    effectiveAA = Math.max(minTaperedAA, annualAllowance - Math.floor((adjustedIncome - 260000) / 2));
  }
  const totalPensionInput = pensionEmpAnnual + pensionErEffective;
  const aaExcess = Math.max(0, totalPensionInput - effectiveAA);
  // ANI used for PA taper, Child Benefit, childcare threshold
  const ani = taxableIncome + bon - pensionReliefAmount;

  const netAdjDeductions = (netDeductions||[]).reduce((s,d) => s + Math.max(0,(Number(d.amount)||0)*12), 0);
  const netAdjAdditions  = (netAdditions||[]).reduce((s,a)  => s + Math.max(0,(Number(a.amount)||0)*12), 0);
  const netAdjTotal      = netAdjAdditions - netAdjDeductions;
  const takeHome         = sal - totalSacrifice - incomeTax - niAmount - slAmount - pensionReliefNet + otherIncomeAnnual + totalAllowances;
  const takeHomeBonus    = takeHome + bon - taxOnBonus - niBonus - slBonus;
  const finalTakeHome    = takeHome + netAdjTotal;
  const finalTakeHomeBonus = takeHomeBonus + netAdjTotal;
  const effectiveRate = sal > 0 ? (incomeTax + niAmount) / sal : 0;
  const marginalRate  = getMarginalRate(
    taxableIncome, effectivePA,
    isScottish ? yearData.scottish : yearData.bands,
    yearData.ni, parseTaxCode(taxCode, yearData.pa).specialRate
  );

  const evNiSaving  = calcNI(niableIncome + evSacAnnual, yearData.ni) - niAmount;
  const evTaxSaving = evSacAnnual * marginalRate;
  const evBikTax    = evBikValue * marginalRate;
  const evNetCost   = evSacAnnual - evTaxSaving - evNiSaving + evBikTax;

  const r2 = n => Math.round((n||0)*100)/100;
  return {
    sal, bon, totalSacrifice:r2(totalSacrifice), pensionSacAnnual:r2(pensionSacAnnual), evSacAnnual:r2(evSacAnnual), otherSacAnnual:r2(otherSacAnnual),
    grossAfterSac:r2(grossAfterSac), totalAllowances:r2(totalAllowances), bikPct, evBikValue:r2(evBikValue), p11dBenefits:r2(p11dBenefits), totalBenefits:r2(totalBenefits),
    taxableIncome:r2(taxableIncome), incomeTax:r2(incomeTax), bandBreakdown, effectivePA:r2(effectivePA),
    taxOnBonus:r2(taxOnBonus), niAmount:r2(niAmount), niBonus:r2(niBonus), slAmount:r2(slAmount), slBonus:r2(slBonus),
    pensionEmpAnnual:r2(pensionEmpAnnual), pensionEmpMethod, pensionReliefAmount:r2(pensionReliefAmount), pensionReliefNet:r2(pensionReliefNet), pensionErAnnual:r2(pensionErAnnual),
    pensionErNiSaving:r2(pensionErNiSaving), pensionErEffective:r2(pensionErEffective),
    otherIncomeAnnual:r2(otherIncomeAnnual),
    netAdjDeductions:r2(netAdjDeductions), netAdjAdditions:r2(netAdjAdditions), netAdjTotal:r2(netAdjTotal),
    takeHome:r2(takeHome), takeHomeBonus:r2(takeHomeBonus), finalTakeHome:r2(finalTakeHome), finalTakeHomeBonus:r2(finalTakeHomeBonus),
    effectiveRate, marginalRate,
    evTaxSaving:r2(evTaxSaving), evNiSaving:r2(evNiSaving), evBikTax:r2(evBikTax), evNetCost:r2(evNetCost), yearData,
    ani:r2(ani), adjustedIncome:r2(adjustedIncome), thresholdIncome:r2(thresholdIncome), effectiveAA:r2(effectiveAA), annualAllowance:r2(annualAllowance), totalPensionInput:r2(totalPensionInput), aaExcess:r2(aaExcess),
  };
}

function calcChildcare(inputs, result) {
  const ani        = result.ani;
  const eligible   = ani <= 100000;
  const aniGap     = Math.max(0, ani - 100000);
  const count      = Math.min(4, Math.max(1, Number(inputs.childrenCount) || 1));
  const TFC_MAX_GOVT = 2000; // max govt top-up per child per year
  const pensionBase = inputs.pensionIncludeBonus ? result.sal + result.bon : result.sal;
  const pensionBaseName = inputs.pensionIncludeBonus ? "salary and bonus" : "base salary";

  let currentTotalChildcareCost = 0;
  let optimisedTotalChildcareCost = 0;
  const childDetails = [];

  for (let i = 1; i <= count; i++) {
    const age = inputs[`child${i}Age`] || '0-2';
    const monthlyFullFee   = Math.max(0, Number(inputs[`child${i}MonthlyCost`]) || 0);
    const monthlyFundedFee = Math.max(0, Number(inputs[`child${i}MonthlyFundedCost`]) || 0);
    const annualFullFee    = monthlyFullFee * 12;
    const annualFundedFee  = monthlyFundedFee * 12;

    const eligibleFreeHours = age === '9m-2y' || age === '3-4';
    const eligibleTfc = age !== '0-8m';

    // Scenario A: Do nothing (Uses current ANI)
    const currentFreeHoursActive = eligible && eligibleFreeHours;
    const currentTfcActive = eligible && eligibleTfc;
    const currentFeeBeforeTfc = currentFreeHoursActive ? annualFundedFee : annualFullFee;
    const currentTfcTopUp = currentTfcActive ? Math.min(currentFeeBeforeTfc * 0.2, TFC_MAX_GOVT) : 0;
    const currentFinalCost = currentFeeBeforeTfc - currentTfcTopUp;

    // Scenario B: Optimised (Sacrifice down to £100k, so ANI < £100k)
    // Note: If you're already < £100k, Scenario B is identical to Scenario A.
    const optFreeHoursActive = eligibleFreeHours;
    const optTfcActive = eligibleTfc;
    const optFeeBeforeTfc = optFreeHoursActive ? annualFundedFee : annualFullFee;
    const optTfcTopUp = optTfcActive ? Math.min(optFeeBeforeTfc * 0.2, TFC_MAX_GOVT) : 0;
    const optFinalCost = optFeeBeforeTfc - optTfcTopUp;

    currentTotalChildcareCost += currentFinalCost;
    optimisedTotalChildcareCost += optFinalCost;

    childDetails.push({ 
      index: i, age, 
      annualFullFee, annualFundedFee, 
      eligibleFreeHours, eligibleTfc,
      currentFreeHoursActive, currentTfcActive, currentTfcTopUp, currentFinalCost,
      optFreeHoursActive, optTfcActive, optTfcTopUp, optFinalCost
    });
  }

  const extraSacrificeNeeded = aniGap;
  const currentTakeHome = result.finalTakeHomeBonus;
  const annualTakeHomeReduction = extraSacrificeNeeded * (1 - result.marginalRate);
  const optimisedTakeHome = currentTakeHome - annualTakeHomeReduction;

  const currentLiquidity = currentTakeHome - currentTotalChildcareCost;
  const optimisedLiquidity = optimisedTakeHome - optimisedTotalChildcareCost;
  const netBenefit = optimisedLiquidity - currentLiquidity; // Positive means sacrificing is better

  const currentTotalTfc = childDetails.reduce((s,c) => s + c.currentTfcTopUp, 0);
  const optTotalTfc = childDetails.reduce((s,c) => s + c.optTfcTopUp, 0);

  const extraSacPctRaw = pensionBase > 0 ? (extraSacrificeNeeded / pensionBase) * 100 : 0;
  const extraSacPct = Math.ceil((extraSacPctRaw - 0.00001) * 10) / 10;
  const currentPensionPctRaw = pensionBase > 0 ? (result.pensionEmpAnnual / pensionBase) * 100 : 0;
  const totalPensionPct = Math.round((currentPensionPctRaw + extraSacPct) * 10) / 10;
  const newTotalPensionInput = result.totalPensionInput + extraSacrificeNeeded;
  const goesOverAllowance = newTotalPensionInput > result.annualAllowance;

  return {
    ani, eligible, aniGap, count, childDetails,
    currentTotalChildcareCost, optimisedTotalChildcareCost, currentTotalTfc, optTotalTfc,
    extraSacrificeNeeded, currentTakeHome, optimisedTakeHome,
    annualTakeHomeReduction, 
    currentLiquidity, optimisedLiquidity, netBenefit,
    worthIt: netBenefit > 0,
    extraSacPct, totalPensionPct, newTotalPensionInput, goesOverAllowance, annualAllowance: result.annualAllowance, pensionBaseName
  };
}

function calcBudget(inputs, result) {
  const r2 = n => Math.round((n + Number.EPSILON) * 100) / 100;
  const monthlyTakeHome = r2(result.finalTakeHome / 12);
  
  const housing = r2((Number(inputs.budgetMortgageRent) || 0) + (Number(inputs.budgetCouncilTax) || 0) +
                     (Number(inputs.budgetHomeInsurance) || 0));
  const utilities = r2((Number(inputs.budgetEnergy) || 0) + (Number(inputs.budgetWater) || 0) + 
                    (Number(inputs.budgetInternet) || 0) + (Number(inputs.budgetOtherUtilities) || 0));

  // Transport (dynamic cars)
  let transport = 0;
  const carsCount = Number(inputs.budgetCarsCount) || 0;
  const carDetails = [];
  for (let i = 0; i < carsCount; i++) {
    const name = inputs[`car${i}Name`] || `Car ${i+1}`;
    const payment = Number(inputs[`car${i}Payment`]) || 0;
    const maintenance = Number(inputs[`car${i}Maintenance`]) || 0;
    const roadTax = Number(inputs[`car${i}RoadTax`]) || 0;
    const insurance = Number(inputs[`car${i}Insurance`]) || 0;
    const other = Number(inputs[`car${i}Other`]) || 0;
    const carTotal = r2(payment + maintenance + roadTax + insurance + other);
    transport += carTotal;
    carDetails.push({ name, payment, maintenance, roadTax, insurance, other, total: carTotal });
  }
  transport = r2(transport + (Number(inputs.budgetPublicTransport) || 0));

  const lifestyle = r2((Number(inputs.budgetGroceries) || 0) + (Number(inputs.budgetHousehold) || 0) + 
                    (Number(inputs.budgetEatingOut) || 0) + (Number(inputs.budgetGym) || 0) + 
                    (Number(inputs.budgetShopping) || 0) + (Number(inputs.budgetHolidays) || 0) +
                    (Number(inputs.budgetLifeInsurance) || 0));
  const savings = r2((Number(inputs.budgetSaving) || 0) + (Number(inputs.budgetInvesting) || 0));
  const financial = r2(savings + (Number(inputs.budgetSinkingFunds) || 0));

  const totalExpenses = r2(housing + utilities + transport + lifestyle + financial);
  const remaining = r2(monthlyTakeHome - totalExpenses);

  return {
    monthlyTakeHome,
    housing,
    utilities,
    transport,
    carDetails,
    carsCount,
    lifestyle,
    financial,
    savings,
    totalExpenses,
    remaining: Object.is(remaining, -0) ? 0 : remaining
  };
}

const _gbp2 = new Intl.NumberFormat('en-GB',{style:'currency',currency:'GBP',minimumFractionDigits:2,maximumFractionDigits:2});
const _num  = new Intl.NumberFormat('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN = n => {
  let v = Math.round((n||0)*100)/100;
  if (Object.is(v, -0)) v = 0;
  return v < 0 ? `(${_num.format(-v)})` : _num.format(v);
};
const fmt  = n => { 
  let v = Math.round((n||0)*100)/100; 
  if (Object.is(v, -0)) v = 0;
  return v < 0 ? `(${_gbp2.format(-v)})` : _gbp2.format(v); 
};
const clamp2dp = v => { const n = parseFloat(v); return isNaN(n) ? v : Math.round(n*100)/100; };
const pct  = n => `${((n||0)*100).toFixed(2)}%`;
const pp   = (annual, freq) => { const v = freq === 'monthly' ? annual / 12 : annual; return Math.round((v||0)*100)/100; };
const ppLabel = freq => freq === 'monthly' ? '/ mo' : '/ yr';

function AnimNum({ value, formatter }) {
  formatter = formatter || fmt;
  const [disp, setDisp] = useState(value);
  const prev = useRef(value);
  const raf  = useRef(null);
  useEffect(() => {
    const from = prev.current, to = value;
    prev.current = to;
    if (Math.abs(from - to) < 0.5) { setDisp(to); return; }
    let start = null;
    cancelAnimationFrame(raf.current);
    raf.current = requestAnimationFrame(function step(ts) {
      if (!start) start = ts;
      const p = Math.min((ts - start) / 450, 1);
      const e = p < 1 ? p*p*(3-2*p) : 1;
      setDisp(from + (to - from) * e);
      if (p < 1) raf.current = requestAnimationFrame(step);
    });
    return () => cancelAnimationFrame(raf.current);
  }, [value]);
  return React.createElement(React.Fragment, null, formatter(disp));
}

// DONUT CHART
// ═══════════════════════════════════════════════════════════════════════════════
function DonutChart({ result, freq }) {
  const size=180,r=68,cx=90,cy=90;
  const circum = 2*Math.PI*r;
  const [prog,setProg] = useState(0);
  const animRef = useRef(null);
  const key = `${result.sal}-${result.incomeTax}-${result.niAmount}-${result.slAmount}-${result.pensionSacAnnual}-${result.pensionReliefAmount}`;
  useEffect(()=>{
    setProg(0);let start=null;
    animRef.current=requestAnimationFrame(function run(ts){
      if(!start)start=ts;
      const p=Math.min((ts-start)/650,1);
      setProg(p<1?p*p*(3-2*p):1);
      if(p<1)animRef.current=requestAnimationFrame(run);
    });
    return ()=>cancelAnimationFrame(animRef.current);
  },[key]);

  const totalPension = result.pensionSacAnnual + result.pensionReliefAmount;
  const deductionSegs = [
    result.incomeTax > 0  && {label:'Income Tax',    value:result.incomeTax,  color:'var(--c1)'},
    result.niAmount > 0   && {label:'Nat. Insurance',value:result.niAmount,   color:'var(--c2)'},
    result.slAmount > 0   && {label:'Student Loan',  value:result.slAmount,   color:'var(--c4)'},
    totalPension > 0      && {label:'Pension',       value:totalPension,      color:'var(--c5)'},
    result.evSacAnnual > 0 && {label:'EV Sacrifice', value:result.evSacAnnual,color:'oklch(62% 0.10 280)'},
  ].filter(Boolean);
  const totalDeductions = deductionSegs.reduce((s, seg) => s + seg.value, 0);
  const takeHomeSlice = Math.max(0, (result.sal || 0) - totalDeductions);
  const segs = [
    {label:'Take Home', value:takeHomeSlice, color:'var(--c3)'},
    ...deductionSegs,
  ];
  const total = result.sal || 1;
  let offset=0;

  return (
    <div id="salary-chart-container" style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap',justifyContent:'center'}}>
      <svg width={size} height={size} style={{flexShrink:0}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth={18}/>
        {segs.map((seg,i)=>{
          const frac=(seg.value/total)*prog;
          const dash=frac*circum;
          const gap=circum-dash;
          const currentOffset = offset;
          offset+=seg.value/total;
          return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={seg.color} strokeWidth={18}
            strokeDasharray={`${dash} ${gap}`} strokeDashoffset={circum*0.25 - currentOffset*circum*prog} strokeLinecap="butt"/>;
        })}
        <text x={cx} y={cy-10} textAnchor="middle" fill="var(--muted)" fontSize="10" fontFamily="DM Sans" fontWeight="600" letterSpacing="0.05em">TAKE HOME</text>
        <text x={cx} y={cy+10} textAnchor="middle" fill="var(--text)" fontSize="16" fontFamily="DM Sans" fontWeight="700">{fmt(pp(result.takeHome,freq))}</text>
        <text x={cx} y={cy+26} textAnchor="middle" fill="var(--muted)" fontSize="9" fontFamily="DM Sans">{ppLabel(freq)}</text>
      </svg>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {segs.map((seg,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:7}}>
            <div style={{width:9,height:9,borderRadius:2,background:seg.color,flexShrink:0}}/>
            <span style={{fontSize:11,color:'var(--muted)',fontWeight:500,minWidth:96}}>{seg.label}</span>
            <span style={{fontSize:11,color:'var(--text)',fontWeight:600,fontVariantNumeric:'tabular-nums'}}>{pct(seg.value/total)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// BREAKDOWN CARD (with clickable expandable rows)
// ═══════════════════════════════════════════════════════════════════════════════
function BreakdownCard({ result, freq, inputs }) {
  const [exp, setExp] = useState({});
  const toggle = k => setExp(p=>({...p,[k]:!p[k]}));
  const f = v => fmt(pp(v, freq));
  const yd = result.yearData;
  const isScottish = inputs.region === 'scotland';
  const totalPension = result.pensionSacAnnual + result.pensionReliefAmount;

  const Row = ({label, value, sub, color, expandable, ek, muted, indent}) => (
    <div>
      <div onClick={expandable?()=>toggle(ek):undefined}
        style={{display:'grid',gridTemplateColumns:'1fr auto',alignItems:'center',
          padding:'8px 0',paddingLeft:indent?16:0,
          cursor:expandable?'pointer':'default',
          opacity:muted?0.65:1,borderRadius:6,
          background:expandable&&exp[ek]?'color-mix(in oklch,var(--accent) 5%,transparent)':'transparent',
          transition:'background .15s',
        }}
        onMouseEnter={e=>{if(expandable)e.currentTarget.style.background='color-mix(in oklch,var(--accent) 6%,transparent)';}}
        onMouseLeave={e=>{e.currentTarget.style.background=expandable&&exp[ek]?'color-mix(in oklch,var(--accent) 5%,transparent)':'transparent';}}>
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          {expandable&&<span style={{fontSize:9,color:'var(--muted)',transition:'transform .2s',display:'inline-block',transform:exp[ek]?'rotate(90deg)':'rotate(0deg)'}}>▶</span>}
          <div>
            <div style={{fontSize:13,fontWeight:500,color:color||'var(--text)'}}>{label}</div>
            {sub&&<div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>{sub}</div>}
          </div>
        </div>
        <span style={{fontSize:13,fontWeight:600,color:color||'var(--text)',fontVariantNumeric:'tabular-nums',minWidth:80,textAlign:'right'}}>
          <AnimNum value={value}/>
        </span>
      </div>
    </div>
  );

  const Detail = ({children}) => (
    <div style={{marginLeft:16,marginBottom:6,animation:'fadeUp .2s ease both'}}>
      <InfoBox type="info" style={{fontSize:11}}>{children}</InfoBox>
    </div>
  );

  return (
    <Card>
      <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>Full Breakdown {ppLabel(freq)}</div>
      <div style={{borderBottom:'1.5px solid var(--border)',marginBottom:4}}/>

      <Row label="Gross Salary" value={pp(result.sal,freq)}/>

      {result.totalAllowances>0&&<>
        <Row label="Allowances & Additional Pay" value={pp(result.totalAllowances,freq)} color="var(--muted)" expandable ek="alw"/>
        {exp.alw&&<Detail>
          <strong>Payroll allowances</strong> are added to your taxable income and NI-able earnings — treated the same as salary for Income Tax, NI, and student loan purposes. Excluded from pension.<br/>
          {inputs.allowanceCar>0&&<div style={{marginTop:4}}>• Car/Travel Allowance: {fmt(inputs.allowanceCar)}/yr</div>}
          {inputs.allowanceOnCall>0&&<div>• On-Call/Shift Allowance: {fmt(inputs.allowanceOnCall)}/yr</div>}
          {inputs.allowanceOther>0&&<div>• Other: {fmt(inputs.allowanceOther)}/yr</div>}
        </Detail>}
      </>}

      {result.totalSacrifice>0&&<>
        <Row label="Salary Sacrifice" value={-pp(result.totalSacrifice,freq)} color="var(--muted)" expandable ek="sac"/>
        {exp.sac&&<Detail>
          <strong>Salary sacrifice</strong> reduces your gross pay before Income Tax and NI are calculated — saving tax on the full sacrificed amount.
          {result.pensionSacAnnual>0&&<div style={{marginTop:4}}>• Pension: {f(result.pensionSacAnnual)}</div>}
          {result.evSacAnnual>0&&<div>• EV/Car: {f(result.evSacAnnual)}</div>}
          {result.otherSacAnnual>0&&<div>• Other: {f(result.otherSacAnnual)}</div>}
          <div style={{marginTop:4,borderTop:'1px solid var(--info-border)',paddingTop:4}}>Gross after sacrifice: <strong>{f(result.grossAfterSac)}</strong></div>
        </Detail>}
      </>}

      {result.totalBenefits>0&&<>
        <Row label="Taxable Benefits (P11D)" value={pp(result.totalBenefits,freq)} color="var(--muted)" expandable ek="ben"/>
        {exp.ben&&<Detail>
          <strong>Benefits in Kind</strong> are employer perks added to your taxable income. You pay Income Tax on them (but not employee NI).
          {result.p11dBenefits>0&&<div style={{marginTop:4}}>• P11D benefits: {f(result.p11dBenefits)}</div>}
          {result.evBikValue>0&&<div>• EV BIK ({pct(result.bikPct)} of P11D): {f(result.evBikValue)}</div>}
          <div style={{marginTop:4}}>Taxable income: <strong>{f(result.taxableIncome)}</strong></div>
        </Detail>}
      </>}

      {result.otherIncomeAnnual>0&&<>
        <Row label="Other Taxable Income" value={pp(result.otherIncomeAnnual,freq)} color="var(--muted)" expandable ek="oti"/>
        {exp.oti&&<Detail>
          <strong>Other taxable income</strong> is added to your taxable income for Income Tax — but does not affect employee NI, pension, or student loan calculations.<br/>
          {inputs.otherIncomeRental>0&&<div style={{marginTop:4}}>• Rental/Property: {fmt(inputs.otherIncomeRental)}/yr</div>}
          {inputs.otherIncomeSavings>0&&<div>• Savings & Interest: {fmt(inputs.otherIncomeSavings)}/yr</div>}
          {inputs.otherIncomeDividends>0&&<div>• Dividends: {fmt(inputs.otherIncomeDividends)}/yr</div>}
          {inputs.otherIncomeOther>0&&<div>• Other: {fmt(inputs.otherIncomeOther)}/yr</div>}
        </Detail>}
      </>}

      {(()=>{
        const ani = result.ani;
        return (
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderTop:'1px dashed var(--border)',borderBottom:'1px dashed var(--border)',margin:'4px 0',background:'color-mix(in oklch,var(--accent) 4%,transparent)',borderRadius:6,paddingLeft:8,paddingRight:4}}>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>Adjusted Net Income</div>
              <div style={{fontSize:10,color:'var(--muted)'}}>Used for PA taper & Child Benefit</div>
            </div>
            <span style={{fontSize:13,fontWeight:700,color:'var(--text)',fontVariantNumeric:'tabular-nums',minWidth:80,textAlign:'right'}}><AnimNum value={pp(ani,freq)}/></span>
          </div>
        );
      })()}

      <Row label="Income Tax" value={-pp(result.incomeTax,freq)} color="var(--red)" expandable ek="it"
        sub={result.effectivePA < yd.pa ? `Reduced PA: ${fmt(result.effectivePA)}` : undefined}/>
      {exp.it&&<Detail>
        <strong>Income Tax</strong> · {inputs.taxYear} · {isScottish?'Scottish rates':'England/Wales/NI rates'}<br/>
        <div style={{marginTop:6}}>
          Gross salary: {f(result.sal)}<br/>
          {result.totalSacrifice>0&&<span>Less sacrifice: −{f(result.totalSacrifice)}<br/></span>}
          {result.totalBenefits>0&&<span>Plus benefits: +{f(result.totalBenefits)}<br/></span>}
          <strong>Taxable income: {f(result.taxableIncome)}</strong>
        </div>
        {result.effectivePA!==yd.pa&&<div style={{marginTop:6,color:'var(--accent)'}}>⚠ Personal Allowance tapered from {fmt(yd.pa)} to {fmt(result.effectivePA)} (income over £100,000 reduces PA by £1 per £2 — effective 60% marginal rate between £100k–£125,140).</div>}
        {result.effectivePA>0&&<div style={{marginTop:4}}>Personal Allowance {fmt(result.effectivePA)} @ 0%</div>}
        {result.bandBreakdown.map((b,i)=><div key={i} style={{marginTop:2}}>{b.name} ({(b.rate*100).toFixed(0)}%): {fmt(b.taxable)} → <strong>{fmt(b.amount)}</strong></div>)}
        <div style={{marginTop:4,borderTop:'1px solid var(--info-border)',paddingTop:4}}>Total Income Tax: <strong>{f(result.incomeTax)}</strong></div>
      </Detail>}

      {result.bandBreakdown.map((b,i)=>(
        <Row key={i} label={b.name} value={-pp(b.amount,freq)} sub={`${(b.rate*100).toFixed(0)}% on ${fmt(b.taxable)}`} color="var(--red)" muted indent/>
      ))}

      <Row label="National Insurance" value={-pp(result.niAmount,freq)} color="var(--red)" expandable ek="ni"/>
      {exp.ni&&<Detail>
        <strong>Employee NI</strong> is calculated on your earnings after salary sacrifice (not on P11D benefits).<br/>
        <div style={{marginTop:4}}>
          NI-able earnings: <strong>{f(result.grossAfterSac)}</strong><br/>
          Lower Earnings Limit: {fmt(yd.ni.lower)}<br/>
          {result.grossAfterSac>yd.ni.lower&&<span>{(yd.ni.rate1*100).toFixed(0)}% on {fmt(Math.min(result.grossAfterSac,yd.ni.upper)-yd.ni.lower)}: <strong>{fmt((Math.min(result.grossAfterSac,yd.ni.upper)-yd.ni.lower)*yd.ni.rate1)}</strong><br/></span>}
          {result.grossAfterSac>yd.ni.upper&&<span>{(yd.ni.rate2*100).toFixed(0)}% on {fmt(result.grossAfterSac-yd.ni.upper)} (above UEL): <strong>{fmt((result.grossAfterSac-yd.ni.upper)*yd.ni.rate2)}</strong><br/></span>}
          Total NI: <strong>{f(result.niAmount)}</strong>
        </div>
      </Detail>}

      {result.slAmount>0&&<>
        <Row label={`Student Loan (${inputs.studentLoan})`} value={-pp(result.slAmount,freq)} color="var(--muted)" expandable ek="sl"/>
        {exp.sl&&yd.studentLoan[inputs.studentLoan]&&<Detail>
          <strong>{inputs.studentLoan} repayments</strong> collected via PAYE on gross salary before sacrifice.<br/>
          <div style={{marginTop:4}}>
            Threshold: {fmt(yd.studentLoan[inputs.studentLoan].threshold)}<br/>
            Rate: {(yd.studentLoan[inputs.studentLoan].rate*100).toFixed(0)}% on earnings above threshold<br/>
            Repayable earnings: {fmt(Math.max(0,result.sal-yd.studentLoan[inputs.studentLoan].threshold))}<br/>
            Annual repayment: <strong>{f(result.slAmount)}</strong>
          </div>
        </Detail>}
      </>}

      {totalPension>0&&<>
        <Row label={`Pension Employee (${result.pensionEmpMethod==='sacrifice'?'Sacrifice':'Relief at Source'})`}
          value={result.pensionEmpMethod==='sacrifice'?0:-pp(result.pensionReliefNet,freq)}
          sub={result.pensionEmpMethod==='sacrifice'?`${f(result.pensionSacAnnual)} deducted from gross`:undefined}
          color="var(--muted)" expandable ek="pen" muted={result.pensionEmpMethod==='sacrifice'}/>
        {exp.pen&&<Detail>
          {result.pensionEmpMethod==='sacrifice'
            ?<span><strong>Salary sacrifice pension</strong> — {f(result.pensionSacAnnual)} was deducted from gross before tax and NI, saving both. Income tax saved: ~{fmt(result.pensionSacAnnual*(result.marginalRate*0.6))} | NI saved: ~{fmt(calcNI(result.grossAfterSac+result.pensionSacAnnual,yd.ni)-result.niAmount)}</span>
            :<span><strong>Relief at Source pension</strong> — you contribute {f(result.pensionReliefNet)} from net pay. HMRC adds 20% basic rate relief automatically. Higher/additional rate taxpayers can claim extra relief via Self Assessment.</span>
          }
          {result.pensionErEffective>0&&<div style={{marginTop:6,borderTop:'1px solid var(--info-border)',paddingTop:6}}>Employer contribution: {fmt(result.pensionErEffective)} (added to pension — not deducted from your pay)</div>}
        </Detail>}
      </>}

      {result.evBikValue>0&&<>
        <Row label="EV Benefit in Kind Tax" value={-pp(result.evBikTax,freq)} color="var(--muted)" expandable ek="ev"/>
        {exp.ev&&<Detail>
          <strong>BIK tax on electric vehicle</strong> — you pay Income Tax on the benefit value of the car.<br/>
          <div style={{marginTop:4}}>
            BIK rate ({inputs.taxYear}): {pct(result.bikPct)}<br/>
            BIK value: {fmt(result.evBikValue)}<br/>
            Tax on BIK (marginal {pct(result.marginalRate)}): <strong>{fmt(result.evBikTax)}</strong>
          </div>
          <div style={{marginTop:6}}>Net annual cost after all savings: <strong>{fmt(result.evNetCost)}</strong> ({fmt(result.evNetCost/12)}/mo)</div>
        </Detail>}
      </>}

      <div style={{borderTop:'2px solid var(--border)',paddingTop:12,marginTop:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:14,fontWeight:700}}>Take-Home Pay</span>
        <span style={{fontSize:16,fontWeight:700,color:'var(--accent)',fontVariantNumeric:'tabular-nums'}}><AnimNum value={pp(result.takeHome,freq)}/></span>
      </div>
      {result.bon>0&&<div style={{marginTop:6,paddingTop:8,borderTop:'1px dashed var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:'var(--muted)'}}>With bonus ({fmt(result.bon)})</span>
        <span style={{fontSize:13,fontWeight:600,color:'var(--green)',fontVariantNumeric:'tabular-nums'}}><AnimNum value={pp(result.takeHomeBonus,freq)}/></span>
      </div>}

      {(result.netAdjDeductions>0||result.netAdjAdditions>0)&&<>
        <div style={{marginTop:12,borderTop:'1px solid var(--border)',paddingTop:10}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>Net Pay Adjustments {ppLabel(freq)}</div>
          {(inputs.netDeductions||[]).map(d=>(Number(d.amount)||0)>0&&(
            <div key={d.id} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'3px 0',color:'var(--muted)'}}>
              <span>{d.label||'Deduction'}</span>
              <span style={{color:'var(--red)',fontVariantNumeric:'tabular-nums'}}>{fmt(-pp((Number(d.amount)||0)*12,freq))}</span>
            </div>
          ))}
          {(inputs.netAdditions||[]).map(a=>(Number(a.amount)||0)>0&&(
            <div key={a.id} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'3px 0',color:'var(--muted)'}}>
              <span>{a.label||'Addition'}</span>
              <span style={{color:'var(--green)',fontVariantNumeric:'tabular-nums'}}>{fmt(pp((Number(a.amount)||0)*12,freq))}</span>
            </div>
          ))}
        </div>
        <div style={{borderTop:'2px solid var(--accent)',paddingTop:10,marginTop:6,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:14,fontWeight:700}}>Net Take-Home</span>
          <span style={{fontSize:16,fontWeight:700,color:'var(--accent)',fontVariantNumeric:'tabular-nums'}}><AnimNum value={pp(result.finalTakeHome,freq)}/></span>
        </div>
        {result.bon>0&&<div style={{marginTop:6,paddingTop:8,borderTop:'1px dashed var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:12,color:'var(--muted)'}}>Net with bonus ({fmt(result.bon)})</span>
          <span style={{fontSize:13,fontWeight:600,color:'var(--green)',fontVariantNumeric:'tabular-nums'}}><AnimNum value={pp(result.finalTakeHomeBonus,freq)}/></span>
        </div>}
      </>}

      {(result.pensionEmpAnnual>0||result.pensionErEffective>0)&&(()=>{
        const empCon = result.pensionEmpAnnual;
        const erCon  = result.pensionErEffective;
        const total  = empCon + erCon;
        return (
          <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)',background:'color-mix(in oklch,var(--green) 6%,transparent)',borderRadius:8,padding:10}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>Pension Pot Summary {ppLabel(freq)}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:'4px 8px',fontSize:12}}>
              <span style={{color:'var(--muted)'}}>Employee contribution</span>
              <span style={{textAlign:'right',fontWeight:600,fontVariantNumeric:'tabular-nums',color:'var(--text)'}}><AnimNum value={pp(empCon,freq)}/></span>
              <span style={{color:'var(--muted)'}}>Employer contribution</span>
              <span style={{textAlign:'right',fontWeight:600,fontVariantNumeric:'tabular-nums',color:'var(--green)'}}><AnimNum value={pp(erCon,freq)}/></span>
              {result.pensionErNiSaving>0&&<>
                <span style={{color:'var(--muted)',fontSize:10,paddingLeft:8}}>— base employer</span>
                <span style={{textAlign:'right',fontSize:10,color:'var(--muted)',fontVariantNumeric:'tabular-nums'}}>{fmt(pp(result.pensionErAnnual,freq))}</span>
                <span style={{color:'var(--muted)',fontSize:10,paddingLeft:8}}>— NI saving passed on</span>
                <span style={{textAlign:'right',fontSize:10,color:'var(--green)',fontVariantNumeric:'tabular-nums'}}>{fmt(pp(result.pensionErNiSaving,freq))}</span>
              </>}
              <div style={{borderTop:'1px solid var(--border)',gridColumn:'1/-1',margin:'4px 0'}}/>
              <span style={{fontWeight:700,color:'var(--text)'}}>Total to pension pot</span>
              <span style={{textAlign:'right',fontWeight:700,color:'var(--green)',fontVariantNumeric:'tabular-nums'}}><AnimNum value={pp(total,freq)}/></span>
            </div>
          </div>
        );
      })()}
    </Card>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MONTHLY PAYSLIP
// ═══════════════════════════════════════════════════════════════════════════════
function PayslipCard({ result, inputs }) {
  const [tab, setTab] = useState('normal');
  const hasBonus = result.bon > 0;
  const yd = result.yearData;

  const SlipRow = ({label, amount, bold, border, color, sub}) => (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderTop:border?'1px solid var(--border)':'none'}}>
      <div>
        <span style={{fontSize:12,fontWeight:bold?700:400,color:color||'var(--text)'}}>{label}</span>
        {sub&&<div style={{fontSize:10,color:'var(--muted)'}}>{sub}</div>}
      </div>
      <span style={{fontSize:12,fontWeight:bold?700:500,color:color||'var(--text)',fontVariantNumeric:'tabular-nums'}}>
        {fmt(amount)}
      </span>
    </div>
  );

  const ns  = result.totalSacrifice/12;
  const nIT = result.incomeTax/12;
  const nNI = result.niAmount/12;
  const nSL = result.slAmount/12;
  const nPen = result.pensionReliefNet/12;
  const nNet = result.takeHome/12;

  return (
    <Card>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--muted)'}}>Monthly Payslip</div>
        {hasBonus&&<Toggle value={tab} onChange={setTab} small options={[{value:'normal',label:'Regular Month'},{value:'bonus',label:'Bonus Month'}]}/>}
      </div>

      {tab==='normal'&&<div>
        <div style={{fontSize:10,fontWeight:600,color:'var(--muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Earnings</div>
        <SlipRow label="Basic Salary" amount={result.sal/12}/>
        {ns>0&&<SlipRow label="Salary Sacrifice" amount={-ns} color="var(--muted)" sub="pre-tax deduction"/>}
        <div style={{borderTop:'1px solid var(--border)',marginTop:4}}/>
        <div style={{fontSize:10,fontWeight:600,color:'var(--muted)',marginBottom:4,marginTop:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>Deductions</div>
        <SlipRow label="PAYE Income Tax" amount={-nIT} color="var(--red)"/>
        <SlipRow label="National Insurance" amount={-nNI} color="var(--red)"/>
        {nSL>0&&<SlipRow label={`Student Loan (${inputs.studentLoan})`} amount={-nSL} color="var(--muted)"/>}
        {nPen>0&&<SlipRow label="Pension (Relief at Source)" amount={-nPen} color="var(--muted)"/>}
        <SlipRow label="Net Pay" amount={nNet} bold border color="var(--accent)"/>
      </div>}

      {tab==='bonus'&&<div>
        <div style={{fontSize:10,fontWeight:600,color:'var(--muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Earnings</div>
        <SlipRow label="Basic Salary" amount={result.sal/12}/>
        <SlipRow label="Bonus" amount={result.bon} color="var(--green)"/>
        {ns>0&&<SlipRow label="Salary Sacrifice" amount={-ns} color="var(--muted)" sub="pre-tax deduction"/>}
        <div style={{borderTop:'1px solid var(--border)',marginTop:4}}/>
        <div style={{fontSize:10,fontWeight:600,color:'var(--muted)',marginBottom:4,marginTop:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>Deductions</div>
        <SlipRow label="PAYE Income Tax" amount={-(nIT+result.taxOnBonus)} color="var(--red)" sub={`incl. ${fmt(result.taxOnBonus)} on bonus`}/>
        <SlipRow label="National Insurance" amount={-(nNI+result.niBonus)} color="var(--red)" sub={`incl. ${fmt(result.niBonus)} on bonus`}/>
        {(nSL+result.slBonus)>0&&<SlipRow label={`Student Loan (${inputs.studentLoan})`} amount={-(nSL+result.slBonus)} color="var(--muted)"/>}
        {nPen>0&&<SlipRow label="Pension (Relief at Source)" amount={-nPen} color="var(--muted)"/>}
        <SlipRow label="Net Pay" amount={nNet+result.bon-result.taxOnBonus-result.niBonus-result.slBonus} bold border color="var(--accent)"/>
        <div style={{marginTop:8,padding:'8px 10px',background:'var(--green-bg)',borderRadius:8,fontSize:11,color:'var(--green)'}}>
          {fmt(result.bon)} bonus → {fmt(result.bon-result.taxOnBonus-result.niBonus-result.slBonus)} net ({pct((result.bon-result.taxOnBonus-result.niBonus-result.slBonus)/result.bon)} retained)
        </div>
      </div>}
    </Card>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// INPUT SECTIONS
// ═══════════════════════════════════════════════════════════════════════════════
function SalaryCard({ inputs, setInputs }) {
  const set = k => v => setInputs(p=>({...p,[k]:v}));
  const [raw, setRaw] = useState(String(inputs.salary));
  useEffect(()=>{ setRaw(String(inputs.salary)); },[inputs.salary]);
  const milestones = [20000,50270,100000,125140,200000];
  return (
    <Card>
      <Label right={inputs.freq==='monthly'?fmt(inputs.salary/12)+'/mo':undefined}>Annual Salary</Label>
      <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:4}}>
        <span style={{fontSize:20,fontWeight:600,color:'var(--muted)'}}>£</span>
        <input type="number" value={raw}
          onChange={e=>{setRaw(e.target.value);const v=parseFloat(e.target.value);if(!isNaN(v)&&v>=0)set('salary')(v);}}
          onBlur={()=>{const c=clamp2dp(raw);set('salary')(isNaN(parseFloat(c))?inputs.salary:parseFloat(c));setRaw(String(clamp2dp(inputs.salary)));}}
          style={{fontSize:20,fontWeight:600,padding:'6px 8px',background:'transparent',border:'none',borderBottom:'2px solid var(--border)',borderRadius:0,width:'100%',color:'var(--text)',fontVariantNumeric:'tabular-nums',outline:'none',transition:'border-color .2s'}}
          onFocus={e=>e.target.style.borderColor='var(--accent)'}/>
      </div>
      <input type="range" min={0} max={250000} step={500} value={Math.min(inputs.salary,250000)} onChange={e=>set('salary')(parseFloat(e.target.value))} style={{marginTop:8}}/>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
        {milestones.map(m=>(

          <strong>Annual Allowance exceeded by {fmt(result.aaExcess)}</strong> — total pension input ({fmt(result.totalPensionInput)}) exceeds your effective allowance of {fmt(result.effectiveAA)}. You may face an Annual Allowance charge on the excess.

        <strong>Salary Sacrifice</strong> — your gross pay is reduced by your pension contribution before Income Tax and NI are calculated. You save tax AND NI on every pound sacrificed. Basic rate taxpayers save 28% (20%+8%), higher rate taxpayers save 48% (40%+8%). Your employer may also pass on their {(yearData.erNiRate*100).toFixed(1)}% NI saving.<br/><br/>

function AdjustmentRow({ item, onUpdate, onRemove }) {

  const [amount, setAmount] = useState(item.amount);
  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 120px 28px',gap:6,alignItems:'center',marginBottom:6}}>
      <input type="text" value={label}
        onChange={e=>setLabel(e.target.value)}
        onBlur={()=>onUpdate(item.id,'label',label)}

        <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:13,fontWeight:600,color:'var(--muted)',pointerEvents:'none'}}>£</span>
        <input type="number" step="0.01" value={amount}
          onChange={e=>setAmount(e.target.value)}
          onBlur={()=>{const v=clamp2dp(amount);setAmount(v);onUpdate(item.id,'amount',v);}}

  );
}

function AdjustmentsCard({ inputs, setInputs }) {

  return (

      <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'var(--muted)',marginBottom:hasAny?12:4}}>Net Pay Adjustments</div>

      {(inputs.netDeductions||[]).length>0&&<>
        <div style={{fontSize:11,fontWeight:600,color:'var(--red)',marginBottom:6}}>Deductions</div>
        {(inputs.netDeductions||[]).map(item=>(
          <AdjustmentRow key={item.id} item={item}
            onUpdate={(id,field,val)=>updItem('netDeductions',id,field,val)}

      </>}
      {(inputs.netAdditions||[]).length>0&&<>
        <div style={{fontSize:11,fontWeight:600,color:'var(--green)',marginBottom:6,marginTop:(inputs.netDeductions||[]).length>0?10:0}}>Additions</div>
        {(inputs.netAdditions||[]).map(item=>(
          <AdjustmentRow key={item.id} item={item}
            onUpdate={(id,field,val)=>updItem('netAdditions',id,field,val)}
            onRemove={id=>remItem('netAdditions',id)}/>

      </>}

      <div style={{display:'flex',gap:8,marginTop:10}}>
        <button onClick={()=>addItem('netDeductions')}
          style={{flex:1,padding:'7px 0',borderRadius:8,border:'1.5px dashed var(--border)',background:'transparent',cursor:'pointer',fontSize:11,color:'var(--red)',fontWeight:600}}>
          + Deduction
        </button>
        <button onClick={()=>addItem('netAdditions')}
          style={{flex:1,padding:'7px 0',borderRadius:8,border:'1.5px dashed var(--border)',background:'transparent',cursor:'pointer',fontSize:11,color:'var(--green)',fontWeight:600}}>
          + Addition

      </div>
      <Explainer>
        These adjustments are applied <strong>after</strong> all tax, NI, and pension calculations — they don't affect your tax position.<br/><br/>
        Common deductions: season ticket loan, court orders, union membership, share scheme contributions, charity payroll giving.<br/>
        Common additions: expense reimbursements, mileage payments, net of tax bonuses already accounted for separately.
      </Explainer>

  );
}

      {!eligible && <div style={{padding:'10px 12px',borderRadius:8,background:'color-mix(in oklch,var(--red) 8%,var(--surface2))',border:'1px solid color-mix(in oklch,var(--red) 25%,transparent)',fontSize:12,color:'var(--red)',marginBottom:14}}>

      {eligible && <div style={{padding:'10px 12px',borderRadius:8,background:'var(--green-bg)',border:'1px solid color-mix(in oklch,var(--green) 30%,transparent)',fontSize:12,color:'var(--green)',marginBottom:14}}>

      </div>}

      <div style={{display:'grid',gridTemplateColumns:'1fr 90px 90px',gap:8,fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',color:'var(--muted)',paddingBottom:6,borderBottom:'1px solid var(--border)'}}>
        <div>Annual Impact</div>
        <div style={{textAlign:'right'}}>Current</div>
        <div style={{textAlign:'right'}}>Optimised</div>
      </div>

      <Row label="Take-Home Pay" a={currentTakeHome} b={eligible ? currentTakeHome : optimisedTakeHome} />
      <div style={{display:'grid',gridTemplateColumns:'1fr 90px 90px',gap:8,fontSize:12,padding:'6px 0',borderBottom:'1px dashed var(--border)'}}>
        <div style={{color:'var(--muted)'}}>Nursery Base Fee</div>
        <div style={{textAlign:'right',fontWeight:600,color:'var(--text)'}}>{fmt(-(currentTotalChildcareCost + ccResult.currentTotalTfc))}</div>
        <div style={{textAlign:'right',fontWeight:600,color:'var(--text)'}}>{fmt(-(eligible ? currentTotalChildcareCost + ccResult.currentTotalTfc : optimisedTotalChildcareCost + ccResult.optTotalTfc))}</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 90px 90px',gap:8,fontSize:12,padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
        <div style={{color:'var(--muted)'}}>Tax-Free Childcare</div>
        <div style={{textAlign:'right',fontWeight:600,color:'var(--green)'}}>+{fmt(ccResult.currentTotalTfc)}</div>
        <div style={{textAlign:'right',fontWeight:600,color:'var(--green)'}}>+{fmt(eligible ? ccResult.currentTotalTfc : ccResult.optTotalTfc)}</div>
      </div>
      <Row label="Final Nursery Bill" a={-currentTotalChildcareCost} b={eligible ? -currentTotalChildcareCost : -optimisedTotalChildcareCost} highlight />
      <div style={{display:'grid',gridTemplateColumns:'1fr 90px 90px',gap:8,fontSize:13,fontWeight:700,padding:'8px 0',background:'var(--surface2)',borderRadius:6,marginTop:4,paddingLeft:8,paddingRight:4}}>
        <div style={{color:'var(--text)'}}>Net Cash in Pocket</div>
        <div style={{textAlign:'right',color:'var(--text)'}}>{fmt(currentLiquidity)}</div>
        <div style={{textAlign:'right',color:'var(--text)'}}>{fmt(eligible ? currentLiquidity : optimisedLiquidity)}</div>
      </div>

      {!eligible && (()=>{
        const isWorthIt = netBenefit >= 0;
        const isBorderline = netBenefit < 0 && netBenefit >= -6000;
        
        let stateBg, stateBorder, stateColor;
        if (isWorthIt) {
          stateBg = 'var(--green-bg)';
          stateBorder = 'color-mix(in oklch,var(--green) 30%,transparent)';
          stateColor = 'var(--green)';
        } else if (isBorderline) {
          stateBg = 'var(--accent-bg)';
          stateBorder = 'color-mix(in oklch,var(--accent) 25%,transparent)';
          stateColor = 'var(--accent)';
        } else {
          stateBg = 'color-mix(in oklch,var(--red) 8%,var(--surface2))';
          stateBorder = 'color-mix(in oklch,var(--red) 25%,transparent)';
          stateColor = 'var(--red)';
        }

        return (
          <div style={{marginTop:12,padding:'12px',borderRadius:10, background: stateBg, border: `1px solid ${stateBorder}`, fontSize:12, color: stateColor, lineHeight:1.5 }}>
            {isWorthIt && <span><strong>Worth it!</strong> By sacrificing {fmt(extraSacrificeNeeded)} into your pension, you actually end up with <strong>{fmt(netBenefit)}/yr ({fmt(netBenefit/12)}/mo) MORE</strong> cash in your pocket, plus your pension grows massively!</span>}
            {isBorderline && <span><strong>Borderline.</strong> Sacrificing {fmt(extraSacrificeNeeded)} leaves you with <strong>{fmt(-netBenefit)}/yr ({fmt(-netBenefit/12)}/mo) LESS</strong> cash in your pocket. However, don't forget the invisible benefit: {fmt(extraSacrificeNeeded)} is added to your pension pot tax-free!</span>}
            {!isWorthIt && !isBorderline && <span><strong>Worse off day-to-day.</strong> Sacrificing {fmt(extraSacrificeNeeded)} leaves you with <strong>{fmt(-netBenefit)}/yr ({fmt(-netBenefit/12)}/mo) LESS</strong> cash in your pocket. While your pension grows significantly, you must comfortably afford this reduction in daily liquidity to make it work.</span>}
          </div>
        );
      })()}

      <Explainer>
        <strong>Net Cash in Pocket</strong> represents your day-to-day liquidity: Take-Home Pay minus your Final Nursery Bill.<br/><br/>
        <strong>Take-Home Pay</strong> includes your regular salary and any post-tax bonus received during the year.<br/><br/>
        <strong>How to pension down:</strong><br/>
        • <em>Salary Sacrifice:</em> Your employer deducts {fmt(extraSacrificeNeeded)} from your gross pay. Your take-home pay smoothly drops by the exact amount shown.<br/>
        • <em>SIPP / Relief at Source:</em> You must deposit the cash <strong>after tax</strong>. You deposit {fmt(extraSacrificeNeeded * 0.8)} from your own bank account. The pension provider adds {fmt(extraSacrificeNeeded * 0.2)}. Finally, you claim the remaining higher-rate tax back from HMRC via Self Assessment. The net mathematical result matches the numbers shown above, but the cash flow requires you to front the money first!
      </Explainer>
    </Card>
  );
}

function BudgetDonut({ budget }) {
  const { housing, utilities, transport, lifestyle, financial, remaining, monthlyTakeHome } = budget;
  const size=180,r=68,cx=90,cy=90;
  const circum = 2*Math.PI*r;
  
  const segs = [
    housing > 0 && {label:'Housing', value:housing, color:'var(--c1)'},
    utilities > 0 && {label:'Utilities', value:utilities, color:'var(--c2)'},
    transport > 0 && {label:'Transport', value:transport, color:'var(--c5)'},
    lifestyle > 0 && {label:'Lifestyle', value:lifestyle, color:'var(--c3)'},
    financial > 0 && {label:'Financial', value:financial, color:'var(--c4)'},
    remaining > 0 && {label:'Leftover', value:remaining, color:'var(--border)'},
  ].filter(Boolean);
  
  const total = monthlyTakeHome || 1;
  let offset = 0;

  return (
    <div id="budget-chart-container" style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap',justifyContent:'center'}}>
      <svg width={size} height={size} style={{flexShrink:0}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--bg2)" strokeWidth={18}/>
        {segs.map((seg,i)=>{
          const frac=(seg.value/total);
          const dash=frac*circum;
          const gap=circum-dash;
          const currentOffset = offset;
          offset+=seg.value/total;
          return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={seg.color} strokeWidth={18}
            strokeDasharray={`${dash} ${gap}`} strokeDashoffset={circum*0.25 - currentOffset*circum} strokeLinecap="butt"/>;
        })}
      </svg>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {segs.map((seg,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:7}}>
            <div style={{width:9,height:9,borderRadius:2,background:seg.color,flexShrink:0}}/>
            <span style={{fontSize:11,color:'var(--muted)',fontWeight:500,minWidth:96}}>{seg.label}</span>
            <span style={{fontSize:11,color:'var(--text)',fontWeight:600,fontVariantNumeric:'tabular-nums'}}>{pct(seg.value/total)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

async function exportToExcel(inputs, result, ccResult, budget) {
  // ── DESIGN TOKENS (light mode palette → ARGB hex) ──────────────────────
  const C = {
    accent:   'FFC07830', // warm gold  --accent  oklch(56% 0.14 55)
    accentLt: 'FFFCF0E0', // light gold tint
    bg:       'FFF8F4EC', // parchment  --bg
    bg2:      'FFEDE9DF', // deeper bg  --bg2
    surface:  'FFFDFAF6', // --surface
    surf2:    'FFF3EFE5', // --surface2
    border:   'FFDDD9CE', // --border
    text:     'FF2C2214', // --text
    muted:    'FF7B7060', // --muted
    green:    'FF3A7A50', // --green
    greenLt:  'FFE4F5EC',
    red:      'FFB83232', // --red
    redLt:    'FFFDE8E8',
    white:    'FFFFFFFF',
    // chart segment colours matching --c1..c4 + c5
    c1: '#C07830', c2: '#3A96A2', c3: '#57A870', c4: '#C2AC6E', c5: '#7070BA',
  };

  // ── FONT / STYLE HELPERS ────────────────────────────────────────────────
  const f  = (sz, bold, argb) => ({ name: 'Segoe UI', size: sz, bold: !!bold, color: { argb } });
  const fl = argb => ({ type: 'pattern', pattern: 'solid', fgColor: { argb } });
  const al = (h, v = 'middle', indent = 0) => ({ horizontal: h, vertical: v, indent });
  const bdr = argb => ({ style: 'thin', color: { argb } });
  const F = {
    title:   f(13, true,  C.white),
    label:   f(9,  true,  C.muted),
    normal:  f(10, false, C.text),
    bold:    f(10, true,  C.text),
    accent:  f(10, true,  C.accent),
    heroNum: f(20, true,  C.accent),
    green:   f(10, true,  C.green),
    red:     f(10, false, C.red),
  };
  const currFmt = '"£"#,##0.00';
  const pctFmt  = '0.00%';

  // set multiple properties on one cell
  const sc = (cell, { value, font, fill, align, numFmt, border } = {}) => {
    if (value   !== undefined) cell.value     = value;
    if (font)                  cell.font      = font;
    if (fill)                  cell.fill      = fl(fill);
    if (align)                 cell.alignment = align;
    if (numFmt)                cell.numFmt    = numFmt;
    if (border)                cell.border    = border;
  };

  // ── CANVAS DONUT CHART ──────────────────────────────────────────────────
  // Returns base64 PNG (no data-URL prefix). Segments: [{label, value, color}]
  // centerLabel: text shown above the centre percentage (first segment %)
  function renderDonut(segments, centerLabel = '') {
    const SZ = 260, LEG_H = 70;
    const canvas = document.createElement('canvas');
    canvas.width = SZ; canvas.height = SZ + LEG_H;
    const ctx = canvas.getContext('2d');
    const cx = SZ / 2, cy = SZ / 2, R = SZ / 2 - 14, Ri = R * 0.52;
    const total = segments.reduce((s, g) => s + g.value, 0);

    // parchment background
    ctx.fillStyle = '#F8F4EC';
    ctx.fillRect(0, 0, SZ, SZ + LEG_H);

    if (total > 0) {
      // draw segments
      let angle = -Math.PI / 2;
      segments.forEach(g => {
        const sweep = (g.value / total) * 2 * Math.PI;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, R, angle, angle + sweep);
        ctx.closePath();
        ctx.fillStyle = g.color;
        ctx.fill();
        angle += sweep;
      });
      // hairline dividers between segments
      angle = -Math.PI / 2;
      segments.forEach(g => {
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
        ctx.strokeStyle = '#F8F4EC';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        angle += (g.value / total) * 2 * Math.PI;
      });
    } else {
      ctx.beginPath(); ctx.arc(cx, cy, R, 0, 2 * Math.PI);
      ctx.fillStyle = '#DDD9CE'; ctx.fill();
    }

    // donut hole
    ctx.beginPath(); ctx.arc(cx, cy, Ri, 0, 2 * Math.PI);
    ctx.fillStyle = '#F8F4EC'; ctx.fill();

    // centre text
    ctx.textAlign = 'center';
    if (centerLabel && total > 0) {
      const pct = Math.round(segments[0].value / total * 100);
      ctx.fillStyle = '#7B7060';
      ctx.font = 'bold 8px Segoe UI, Arial, sans-serif';
      ctx.fillText(centerLabel.toUpperCase(), cx, cy - 5);
      ctx.fillStyle = '#2C2214';
      ctx.font = 'bold 17px Segoe UI, Arial, sans-serif';
      ctx.fillText(pct + '%', cx, cy + 13);
    }

    // legend (up to 2 rows of 3)
    let lx = 8, ly = SZ + 14;
    segments.forEach((g, i) => {
      if (i > 0 && i % 3 === 0) { lx = 8; ly += 22; }
      ctx.fillStyle = g.color;
      ctx.fillRect(lx, ly, 8, 8);
      ctx.fillStyle = '#7B7060';
      ctx.font = '9px Segoe UI, Arial, sans-serif';
      ctx.textAlign = 'left';
      const pStr = total > 0 ? ' ' + Math.round(g.value / total * 100) + '%' : '';
      ctx.fillText(g.label + pStr, lx + 11, ly + 8);
      lx += SZ / 3;
    });

    return canvas.toDataURL('image/png').split(',')[1];
  }

  // ── WORKBOOK ─────────────────────────────────────────────────────────────
  const wb = new ExcelJS.Workbook();
  wb.creator = 'UK Salary Calculator';
  wb.created = new Date();

  // ═════════════════════════════════════════════════════════════════════════
  // SHEET 1 — SALARY & TAX
  // ═════════════════════════════════════════════════════════════════════════
  const ws1 = wb.addWorksheet('Salary & Tax');
  ws1.columns = [
    { width: 32 }, // A label
    { width: 16 }, // B annual / taxable
    { width: 11 }, // C monthly / rate
    { width: 16 }, // D monthly / tax paid
    { width: 2  }, // E spacer
    { width: 13 }, { width: 13 }, { width: 13 }, { width: 13 }, { width: 13 }, // F-J chart
  ];

  // Title
  ws1.mergeCells('A1:D1'); ws1.getRow(1).height = 36;
  sc(ws1.getCell('A1'), {
    value: `UK Take-Home Salary Report  ·  ${inputs.taxYear}  ·  ${inputs.region === 'scotland' ? 'Scotland' : 'England / Wales / NI'}`,
    font: F.title, fill: C.accent, align: al('left', 'middle', 1),
  });

  // Spacer
  ws1.getRow(2).height = 10;

  // Hero take-home
  ws1.mergeCells('A3:D3'); ws1.getRow(3).height = 18;
  sc(ws1.getCell('A3'), { value: 'TAKE-HOME PAY', font: F.label, fill: C.bg, align: al('left', 'bottom', 1) });
  ws1.mergeCells('A4:D4'); ws1.getRow(4).height = 34;
  sc(ws1.getCell('A4'), { value: result.finalTakeHome, font: F.heroNum, fill: C.bg, numFmt: '"£"#,##0.00', align: al('left', 'middle', 1) });
  ws1.mergeCells('A5:D5'); ws1.getRow(5).height = 18;
  sc(ws1.getCell('A5'), {
    value: `£${Math.round(result.finalTakeHome / 12).toLocaleString('en-GB')}/mo  ·  Effective rate ${(result.effectiveRate * 100).toFixed(1)}%  ·  Marginal rate ${(result.marginalRate * 100).toFixed(1)}%`,
    font: f(9, false, C.muted), fill: C.bg, align: al('left', 'top', 1),
  });

  ws1.getRow(6).height = 10;

  // Section header
  ws1.mergeCells('A7:D7'); ws1.getRow(7).height = 24;
  sc(ws1.getCell('A7'), { value: 'INCOME & DEDUCTIONS', font: F.label, fill: C.bg2, align: al('left', 'middle', 1) });

  // Column headers row
  ws1.getRow(8).height = 22;
  [['', 1, 'left'], ['Annual', 2, 'right'], ['Monthly', 4, 'right']].forEach(([v, col, h]) => {
    sc(ws1.getCell(8, col), {
      value: v, font: F.label, fill: C.surf2, align: al(h, 'middle', h === 'left' ? 1 : 0),
      border: { bottom: bdr(C.border) },
    });
  });

  // Summary rows
  const totalPension = result.pensionSacAnnual + result.pensionReliefNet;
  const sumRows = [
    { label: 'Gross Salary',         ann: result.sal,            type: 'gross' },
    { label: 'Income Tax',           ann: -result.incomeTax,     type: 'ded' },
    { label: 'National Insurance',   ann: -result.niAmount,      type: 'ded' },
    ...(result.slAmount > 0   ? [{ label: 'Student Loan',         ann: -result.slAmount,  type: 'ded' }] : []),
    ...(totalPension > 0      ? [{ label: 'Pension (Employee)',   ann: -totalPension,     type: 'ded' }] : []),
    null,
    { label: 'Take-Home Pay',        ann: result.finalTakeHome,  type: 'takehome' },
    ...(result.bon > 0        ? [{ label: 'Incl. Bonus',         ann: result.finalTakeHomeBonus, type: 'takehome' }] : []),
  ];

  let rn = 9, alt = 0;
  sumRows.forEach(r => {
    if (r === null) { ws1.getRow(rn).height = 6; rn++; return; }
    ws1.getRow(rn).height = 22;
    const bg = r.type === 'takehome' ? C.accentLt : alt % 2 === 0 ? C.surface : C.white;
    alt++;
    sc(ws1.getCell(rn, 1), { value: r.label, font: r.type === 'takehome' ? F.accent : r.type === 'gross' ? F.bold : F.normal, fill: bg, align: al('left', 'middle', 1) });
    [2, 4].forEach((col, i) => {
      const val = i === 0 ? r.ann : r.ann / 12;
      sc(ws1.getCell(rn, col), {
        value: val,
        font: r.type === 'takehome' ? F.accent : r.type === 'ded' ? F.red : F.bold,
        fill: bg, numFmt: currFmt, align: al('right', 'middle'),
      });
    });
    rn++;
  });

  // Band breakdown
  ws1.getRow(rn).height = 12; rn++;
  ws1.mergeCells(`A${rn}:D${rn}`); ws1.getRow(rn).height = 24;
  sc(ws1.getCell(rn, 1), { value: 'TAX BAND BREAKDOWN', font: F.label, fill: C.bg2, align: al('left', 'middle', 1) });
  rn++;
  ws1.getRow(rn).height = 22;
  [['Band', 1, 'left'], ['Taxable', 2, 'right'], ['Rate', 3, 'right'], ['Tax Paid', 4, 'right']].forEach(([v, col, h]) => {
    sc(ws1.getCell(rn, col), { value: v, font: F.label, fill: C.surf2, align: al(h, 'middle', h === 'left' ? 1 : 0), border: { bottom: bdr(C.border) } });
  });
  rn++;
  result.bandBreakdown.forEach((b, idx) => {
    ws1.getRow(rn).height = 20;
    const bg = idx % 2 === 0 ? C.surface : C.white;
    sc(ws1.getCell(rn, 1), { value: b.name,    font: F.normal, fill: bg, align: al('left',  'middle', 1) });
    sc(ws1.getCell(rn, 2), { value: b.taxable, font: F.normal, fill: bg, numFmt: currFmt, align: al('right', 'middle') });
    sc(ws1.getCell(rn, 3), { value: b.rate,    font: F.normal, fill: bg, numFmt: pctFmt,  align: al('right', 'middle') });
    sc(ws1.getCell(rn, 4), { value: b.amount,  font: F.normal, fill: bg, numFmt: currFmt, align: al('right', 'middle') });
    rn++;

  // Salary donut chart
  const salSegs = [

    { label: 'Income Tax',     value: result.incomeTax,                  color: C.c1 },
    { label: 'Nat. Insurance', value: result.niAmount,                   color: C.c2 },
